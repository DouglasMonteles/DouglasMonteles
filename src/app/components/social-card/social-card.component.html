<mat-card class="">
  <div class="flex flex-col lg:flex-row">
    <div class="w-full">
      <img
        mat-card-image
        [src]="imageLink"
        [alt]="'Rede social: ' + name"
      >
    </div>

    <div class="w-full flex flex-col justify-between">
      <mat-card-header>
        <mat-card-title>{{name}}</mat-card-title>
        <mat-card-subtitle>Rede social</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <ng-content></ng-content>
      </mat-card-content>

      <a
        class="text-xs w-full sm:w-auto m-2"
        mat-raised-button
        color="primary"
        [href]="link"
        target="_blank"
      >
        Ir para {{name}}
      </a>
    </div>
  </div>
</mat-card>
