<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
    color="primary"
  >
    <mat-toolbar>Acesso rápido</mat-toolbar>

    <mat-nav-list>
      <a mat-list-item routerLink="user-info">Informações básicas</a>
      <a mat-list-item href="#skills">Habilidades</a>
      <a mat-list-item href="#projects">Projetos</a>
      <a mat-list-item href="#education">Educação</a>
      <a mat-list-item href="#experiencies">Experiencia</a>
      <a mat-list-item href="#certificates">Certificados</a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="primary" class="grid-container">
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        *ngIf="isHandset$ | async"
      >
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span>Portfólio</span>
    </mat-toolbar>

    <!-- Add Content Here -->
    <main>
      <router-outlet></router-outlet>
    </main>

    <app-footer />
  </mat-sidenav-content>
</mat-sidenav-container>
